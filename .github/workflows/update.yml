name: Filo Play Auto Update

on:
  schedule:
    # Berjalan otomatis setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch: # Memungkinkan tombol jalan manual

permissions:
  contents: write

jobs:
  run-grabber:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Grabber Script
        run: python grabber.py

      - name: Commit & Push Playlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          git commit -m "Update playlist.m3u [skip ci]" || exit 0
          git push
