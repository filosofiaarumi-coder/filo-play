name: Filo Play Auto Update

on:
  schedule:
    # Berjalan otomatis setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch: # Memungkinkan tombol jalan manual

permissions:
  contents: write

jobs:
  run-grabber:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Run Grabber Script
        run: |
          python grabber.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan file ottlist.m3u dan playlist.m3u ke staging
          git add ottlist.m3u playlist.m3u || true
          
          # Simpan dan upload jika ada perubahan file
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan pada file playlist."
          else
            git commit -m "Auto update playlist [skip ci]"
            git push
          fi
